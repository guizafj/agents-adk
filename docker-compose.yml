# ============================================================================
# Cybersecurity Tutor — docker-compose.yml
#
# DISEÑO DE VOLÚMENES:
#   - El código viene de la imagen (COPY en Dockerfile) — no de bind mounts
#   - El .venv vive dentro de la imagen — no se tapa con volúmenes anónimos
#   - Solo la BD SQLite usa volumen persistente nombrado
#
# PERSISTENCIA:
#   ✅ docker compose up --build   → reconstruye imagen, conserva historial de sesiones
#   ✅ docker compose restart      → reinicia sin reconstruir, conserva todo
#   ❌ docker compose down -v      → BORRA volúmenes (solo para reset total)
#
# PRIMER USO:
#   docker compose up --build
#
# USO NORMAL:
#   docker compose up -d
#   docker compose logs -f adk
#   Reiniciar:    docker compose restart adk   (conserva historial)
#   Reset total:  docker compose down -v       (BORRA historial)
# ============================================================================

services:
  adk:
    build:
      context: .
      dockerfile: Dockerfile
    image: tutor:latest
    container_name: tutor
    # host: el contenedor comparte red con el host
    # necesario para alcanzar Ollama en localhost:11434
    # y las VMs QEMU que estén en la red del host
    network_mode: host
    environment:
      - OLLAMA_API_BASE=http://localhost:11434
      - OLLAMA_BASE_URL=http://localhost:11434
      - OLLAMA_MODEL=ollama_chat/qwen3.5:latest

      # ── Contexto y streaming ───────────────────────────────────────────────
      # Ventana de contexto explícita — qwen3.5 por defecto usa 2048 si no se indica
      # 8192 tokens mantiene ~15-20 turnos de conversación completos
      - OLLAMA_NUM_CTX=8192

      # ── Persistencia ───────────────────────────────────────────────────────
      - PERSISTENCE_DB_PATH=/app/data/persistence/sessions.db

      # ── Logging ────────────────────────────────────────────────────────────
      - ADK_LOG_LEVEL=INFO

      # ── Timeouts LiteLLM (segundos) ────────────────────────────────────────
      # request_timeout: máximo que espera una respuesta completa
      # Qwen3.5 con thinking puede tardar en generar — 300s = 5 minutos
      - LITELLM_REQUEST_TIMEOUT=300
      # connect_timeout: tiempo máximo para establecer conexión con Ollama
      - LITELLM_CONNECT_TIMEOUT=30

    volumes:
      # ÚNICO volumen: la BD SQLite de sesiones
      # Nombrado → Docker lo gestiona, no depende de rutas del host
      # Sobrevive a docker compose up --build
      - tutor_persistence:/app/data/persistence
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

# El volumen nombrado garantiza que Docker gestiona la persistencia
# Para ver dónde está en el host: docker volume inspect cybersec_tutor_persistence
volumes:
  tutor_persistence:
    name: tutor_persistence
